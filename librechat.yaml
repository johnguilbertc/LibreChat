version: 1.3.13
cache: true

interface:
  modelSelect: true
  parameters: true
  presets: true
  bookmarks: true
  memories: true
  multiConvo: true
  temporaryChat: true
  runCode: true
  webSearch: true
  fileSearch: true
  fileCitations: true
  prompts:
    use: true
    create: true
    share: true
    public: false
  agents:
    use: true
