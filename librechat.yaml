version: 1.3.13
cache: true

interface:
  modelSelect: true
  parameters: true
  presets: true
  bookmarks: true
  memories: true
  multiConvo: true
  temporaryChat: true
  runCode: true
  webSearch: true
  fileSearch: true
  fileCitations: true
  prompts:
    use: true
    create: true
    share: true
    public: false
  agents:
    use: true
    create: true
    share: true
    public: false
  marketplace:
    use: true

registration:
  socialLogins: ['google', 'github', 'discord']

endpoints:
  agents:
    recursionLimit: 50
    maxRecursionLimit: 100
    capabilities: ["deferred_tools", "execute_code", "file_search", "actions", "tools"]

  custom:
    - name: 'OpenRouter'
      apiKey: '${OPENROUTER_KEY}'
      baseURL: 'https://openrouter.ai/api/v1'
      models:
        default: ['meta-llama/llama-3-70b-instruct']
        fetch: true
      titleConvo: true
      titleModel: 'meta-llama/llama-3-70b-instruct'
      dropParams: ['stop']
      modelDisplayLabel: 'OpenRouter'

    - name: 'groq'
      apiKey: '${GROQ_API_KEY}'
      baseURL: 'https://api.groq.com/openai/v1/'
      models:
        default:
          - 'llama3-70b-8192'
          - 'llama3-8b-8192'
          - 'mixtral-8x7b-32768'
        fetch: false
      titleConvo: true
      titleModel: 'mixtral-8x7b-32768'
      modelDisplayLabel: 'groq'

    - name: 'Mistral'
      apiKey: '${MISTRAL_API_KEY}'
      baseURL: 'https://api.mistral.ai/v1'
      models:
        default: ['mistral-tiny', 'mistral-small', 'mistral-medium']
        fetch: true
      titleConvo: true
      titleModel: 'mistral-tiny'
      modelDisplayLabel: 'Mistral'
      dropParams: ['stop', 'user', 'frequency_penalty', 'presence_penalty']
